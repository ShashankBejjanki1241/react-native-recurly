# https://docs.coderabbit.ai/configuration/auto-review
language: en-US

reviews:
  profile: assertive
  sequence_diagrams: true
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  related_issues: true
  related_prs: true
  assess_linked_issues: true
  estimate_code_review_effort: true
  review_details: true
  # CodeRabbit often skips lockfiles by default; path_instructions apply when the file is in scope.
  path_instructions:
    - path: "package-lock.json"
      instructions: |
        When this file is part of the review, summarize meaningful changes: new or removed
        packages, major version bumps, and anything that looks security-relevant.
    - path: "src/**/*.ts"
      instructions: "Focus on architectural patterns, dependency management, and system design impact."
  auto_review:
    enabled: true
    # GitHub default branch (`main`) is always auto-reviewed.
    # These patterns add reviews for promotion PRs when base is not the default yet.
    base_branches:
      - "^dev$"
      - "^qa$"
      - "^prod$"
      - "^main$"

tone_instructions: "Provide architectural insights on system design, scalability, and long-term maintainability."

knowledge_base:
  linked_repositories:
    - repository: "myorg/backend-api"
      instructions: "Contains REST API endpoints and database models"
    - repository: "myorg/shared-library"
      instructions: "Contains shared utilities and type definitions"
