# Runs the same checks documented in .cursor/rules/coderabbit-and-commit-checks.mdc
name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main
      - qa
      - prod

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
